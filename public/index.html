<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base href="/vault-chat/">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>王者之剑 - 知识库</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('app');
      if (el) el.innerHTML = '<div style="color:red;padding:20px;font-size:14px;white-space:pre-wrap;">JS错误: ' + msg + '\n' + (src||'') + ':' + line + '</div>';
    };
    window.onunhandledrejection = function(e) {
      var el = document.getElementById('app');
      if (el) el.innerHTML = '<div style="color:red;padding:20px;font-size:14px;white-space:pre-wrap;">异步错误: ' + (e.reason?.message || e.reason) + '</div>';
    };
  </script>
  <script type="module" src="src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
